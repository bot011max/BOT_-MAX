version: '3.8'

services:
  postgres-test:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical_bot_test
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq-test:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  voice-service-test:
    build:
      context: ./microservices/voice
      dockerfile: Dockerfile.test
    environment:
      MODEL_SIZE: tiny  # для быстрых тестов
    ports:
      - "8001:8000"
    depends_on:
      rabbitmq-test:
        condition: service_healthy

  ocr-service-test:
    build:
      context: ./microservices/ocr
      dockerfile: Dockerfile.test
    environment:
      USE_MOCK: true  # мок для тестов
    ports:
      - "8002:8000"

  llm-service-test:
    build:
      context: ./microservices/llm
      dockerfile: Dockerfile.test
    environment:
      USE_MOCK: true
    ports:
      - "8003:8000"
