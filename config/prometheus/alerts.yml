groups:
  - name: medical_bot_alerts
    interval: 30s
    rules:
      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High request rate detected"

      - alert: APIDown
        expr: up{job="medical-bot-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API is down"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"

      - alert: FailedLogins
        expr: rate(login_attempts_total{status="failed"}[5m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Possible brute force attack"
