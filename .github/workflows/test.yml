name: Проверка Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Проверка форматирования
      run: go fmt ./...
    
    - name: Запуск тестов
      run: go test ./...
    
    - name: Сборка
      run: go build -v ./...
