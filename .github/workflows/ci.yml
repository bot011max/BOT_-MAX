name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medical_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run unit tests
      run: go test ./tests/unit/... -v -coverprofile=coverage.txt -covermode=atomic

    - name: Run integration tests
      run: go test ./tests/integration/... -v
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: medical_bot_test
        REDIS_HOST: localhost
        REDIS_PORT: 6379

    - name: Run security tests
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec -no-fail -fmt=json -out=results.json ./...
        
        go install github.com/OWASP/Amass/v3/...@master
        amass enum -d localhost -o amass.txt

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.txt
        flags: unittests

    - name: Upload security results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.json

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: deployments/Dockerfile.api
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/medical-bot-api:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/medical-bot-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/medical-bot-api:buildcache,mode=max

    - name: Build and push Telegram bot
      uses: docker/build-push-action@v5
      with:
        context: .
        file: deployments/Dockerfile.telegram
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/medical-bot-telegram:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/medical-bot-telegram:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/medical-bot-telegram:buildcache,mode=max
