name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Test
      run: go test -v ./...
    
    - name: Security Scan
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec ./...
