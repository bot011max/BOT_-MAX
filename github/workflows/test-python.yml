name: Python Microservices Tests

on:
  push:
    paths:
      - 'microservices/**'
      - 'requirements.txt'
  pull_request:
    paths:
      - 'microservices/**'

jobs:
  test-voice-service:
    name: Voice Service (Whisper)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/voice
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: microservices/voice/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./microservices/voice/coverage.xml
          flags: voice-service

  test-ocr-service:
    name: OCR Service (Document Processing)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/ocr
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-rus poppler-utils
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: microservices/ocr/requirements.txt
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml
      
      - name: Test PDF processing
        run: |
          python -c "from app import process_document; print('PDF test passed')"

  test-llm-service:
    name: LLM Service (Prompts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/llm
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests with mocks
        run: |
          pytest tests/ -v --cov=. --cov-report=xml
        env:
          MOCK_LLM: true
